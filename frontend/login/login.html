<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventFlow</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="../img/Logo eventflow.png">
    
</head>
<body>
    <main>
        <div class="return">
            <a href="../inicial/index.html" class="return-link">
                <img src="../img/seta esquerda.png" alt="Seta Voltar" class="return-icon">
            </a>
        </div>
        <div class="welcome-container">
            <div class="welcome-card">
                <div class="complete-logo">
                    <img src="../img/Logo eventflow.png" alt="Mascote Flow" class="logo-mascote">
                    <img src="../img/Logo texto.png" alt="EventFlow" class="logo-texto">
                </div>

                <div class="brand-description">
                    <p class="description">
                        Sua jornada para eventos incríveis começa aqui. <br>
                        Para explorar e garantir sua vaga, faça login na sua conta:
                    </p>
                </div>

                <form action="#" method="post" class="login-form" id="formLogin">
                    <input type="email" name="email" placeholder="Email" id="emailLogin" required>
                    <input type="password" name="password" placeholder="Senha"  id="passwordLogin" required>
                    <p id="mensagem3" style="color: red; display: none;">Insira os campos: Senha ou E-mail</p>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
            </div>
        </div>
    </main>
    <script src="../auth.js"></script>
</body>
</html>

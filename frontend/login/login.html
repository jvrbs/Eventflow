<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow - Sua jornada para eventos</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="/Eventflow/frontend/img/Logo eventflow.png">
    
</head>
<body>
    <main>
        <div class="return">
            <a href="/Eventflow/frontend/inicial/index.html" class="return-link">
                <img src="/Eventflow/frontend/img/seta esquerda.png" alt="Seta Voltar" class="return-icon">
            </a>
        </div>
        <div class="welcome-container">
            <div class="welcome-card">
                <div class="complete-logo">
                    <img src="/Eventflow/frontend/img/Logo eventflow.png" alt="Mascote Flow" class="logo-mascote">
                    <img src="/Eventflow/frontend/img/Logo texto.png" alt="EventFlow" class="logo-texto">
                </div>

                <div class="brand-description">
                    <p class="description">
                        Sua jornada para eventos incríveis começa aqui. <br>
                        Para explorar e garantir sua vaga, faça login na sua conta:
                    </p>
                </div>

                <form action="#" method="post" class="login-form">
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Senha" required>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
            </div>
        </div>
    </main>
    <script src="/Eventflow/frontend/auth.js"></script>
</body>
</html>

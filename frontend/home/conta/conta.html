<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - EventFlow</title>    

    <link rel="icon" type="image/png" href="../../img/Logo eventflow.png">
    
    <link rel="stylesheet" href="../home.css">
    <link rel="stylesheet" href="conta.css">
</head>

<body>

    <header class="header-eventflow" id="headerPill">
        <div class="logo-area">
            <img src="../../img/Logo texto solo.png" alt="Logo EventFlow" class="img-logo">
        </div>
        <nav class="menu-horizontal-links">
            <a href="../home.html">Início</a>
            <a href="#">Ingressos</a>
            <a href="#" onclick="logout('../../login/login.html')">Sair</a>
        </nav>
        <button class="menu-hamburguer" id="btnMenu">
            <span class="barrinha"></span>
            <span class="barrinha"></span>
            <span class="barrinha"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <main class="conta-wrapper">
        <section class="menu-conta-card">
            <div class="avatar-topo">
                <div class="avatar-image">?</div> <h2>Carregando...</h2> 
            </div>

            <nav class="opcoes-conta">
                <a href="../info-pessoal/info-pessoais.html" class="btn-opcao">
                    Informações Pessoais
                </a>
                <a href="#" class="btn-opcao">
                    Segurança e Senha
                </a>
                <a href="#" class="btn-opcao btn-excluir" onclick="abrirModalExcluir(event)">
                    Excluir Minha Conta
                </a>
                <a href="#" onclick="logout('../../login/login.html')" class="btn-opcao logout">
                    Sair da Conta
                </a>
            </nav>
        </section>
    </main>

    <div id="modalExcluir" class="modal-container">
        <div class="modal-content">
            <h3>Excluir Conta?</h3>
            <p>Esta ação é permanente e você perderá acesso a todos os seus ingressos no EventFlow.</p>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirmar-exclusao" id="btnFinalExcluir">Confirmar Exclusão</button>
            </div>
        </div>
    </div>

    <script src="../../session.js"></script>
    <script src="../home.js"></script>
    <script src="conta.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Evento - EventFlow</title>
    <link rel="icon"       type="image/png" href="../img/Logo eventflow.png">
    <link rel="stylesheet" href="../home/home.css">
    <link rel="stylesheet" href="../eventos.css">
</head>
<body>

    <header class="header-eventflow" id="headerPill">
        <div class="logo-area">
            <img src="../img/Logo texto solo.png" alt="Logo EventFlow" class="img-logo">
        </div>
        <nav class="menu-horizontal-links">
            <a href="../home/home.html">Início</a>
            <a href="gerenciar-eventos.html">Meus Eventos</a>
            <a href="#" onclick="logout('../inicial/index.html')">Sair</a>
        </nav>
        <button class="menu-hamburguer" id="btnMenu">
            <span class="barrinha"></span>
            <span class="barrinha"></span>
            <span class="barrinha"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <main class="page-wrapper">
        <div class="container-sm">

            <div class="page-header">
                <h1>Criar Evento</h1>
                <p>Preencha os dados abaixo para publicar seu evento na plataforma.</p>
            </div>

            <div class="card">
                <div id="msgFeedback" class="msg-feedback" role="alert"></div>

                <form id="formCriarEvento" novalidate>

                    <div class="form-grid">

                        <!-- Nome do evento (full-width) -->
                        <div class="form-group full-width">
                            <label for="nomeEvento">Nome do Evento *</label>
                            <input
                                type="text"
                                id="nomeEvento"
                                name="nome"
                                maxlength="100"
                                placeholder="Ex: Festival de Jazz 2025"
                                required
                                autocomplete="off"
                            >
                            <span class="char-counter"><span id="contNome">0</span>/100</span>
                        </div>

                        <!-- Descrição (full-width) -->
                        <div class="form-group full-width">
                            <label for="descricaoEvento">Descrição *</label>
                            <textarea
                                id="descricaoEvento"
                                name="descricao"
                                maxlength="1000"
                                rows="4"
                                placeholder="Descreva o evento, atrações, programação..."
                                required
                            ></textarea>
                            <span class="char-counter"><span id="contDesc">0</span>/1000</span>
                        </div>

                        <!-- Data e hora -->
                        <div class="form-group">
                            <label for="dataHoraEvento">Data e Hora *</label>
                            <input
                                type="datetime-local"
                                id="dataHoraEvento"
                                name="data_hora"
                                required
                            >
                        </div>

                        <!-- Categoria -->
                        <div class="form-group">
                            <label for="categoriaEvento">Categoria *</label>
                            <select id="categoriaEvento" name="categoria" required>
                                <option value="">Selecione uma categoria</option>
                                <option value="Música">🎵 Música</option>
                                <option value="Teatro">🎭 Teatro</option>
                                <option value="Esportes">⚽ Esportes</option>
                                <option value="Tecnologia">💻 Tecnologia</option>
                                <option value="Gastronomia">🍽️ Gastronomia</option>
                                <option value="Arte">🎨 Arte</option>
                                <option value="Negócios">💼 Negócios</option>
                                <option value="Outros">📅 Outros</option>
                            </select>
                        </div>

                        <!-- Local (full-width) -->
                        <div class="form-group full-width">
                            <label for="localEvento">Local *</label>
                            <input
                                type="text"
                                id="localEvento"
                                name="local"
                                maxlength="200"
                                placeholder="Ex: Teatro Municipal, São Paulo - SP"
                                required
                            >
                        </div>

                        <!-- Capacidade -->
                        <div class="form-group">
                            <label for="capacidadeEvento">Capacidade (vagas) *</label>
                            <input
                                type="number"
                                id="capacidadeEvento"
                                name="capacidade"
                                min="1"
                                max="100000"
                                placeholder="Ex: 200"
                                required
                            >
                        </div>

                    </div><!-- /form-grid -->

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="btnCriar">
                            ✨ Publicar Evento
                        </button>
                        <a href="gerenciar-eventos.html" class="btn-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div><!-- /card -->

        </div>
    </main>

    <script src="../session.js"></script>
    <script src="../home/home.js"></script>
    <script src="criar-evento.js"></script>
</body>
</html>

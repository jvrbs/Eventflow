<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento - EventFlow</title>
    <link rel="icon"       type="image/png" href="../img/Logo eventflow.png">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="../eventos.css">
    <link rel="stylesheet" href="evento-detalhe.css">
</head>
<body>

    <header class="header-eventflow" id="headerPill">
        <div class="logo-area">
            <img src="../img/Logo texto solo.png" alt="Logo EventFlow" class="img-logo">
        </div>
        <nav class="menu-horizontal-links">
            <a href="home.html">Início</a>
            <a href="conta/conta.html">Conta</a>
            <a href="#" onclick="logout()">Sair</a>
        </nav>
        <button class="menu-hamburguer" id="btnMenu">
            <span class="barrinha"></span>
            <span class="barrinha"></span>
            <span class="barrinha"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <main class="detalhe-wrapper">

        <!-- Mensagem de erro geral -->
        <div id="msgErro" class="msg-feedback" style="width:100%;max-width:700px;"></div>

        <!-- Skeleton enquanto carrega -->
        <div id="skeletonDetalhe" class="detalhe-card">
            <div class="skeleton" style="height:200px;border-radius:28px 28px 0 0;"></div>
            <div style="padding:32px;display:flex;flex-direction:column;gap:16px;">
                <div class="skeleton" style="height:16px;width:25%;"></div>
                <div class="skeleton" style="height:14px;width:100%;"></div>
                <div class="skeleton" style="height:14px;width:85%;"></div>
                <div class="skeleton" style="height:14px;width:70%;"></div>
                <div class="skeleton" style="height:44px;width:100%;border-radius:12px;margin-top:8px;"></div>
            </div>
        </div>

        <!-- Card do evento — preenchido pelo JS -->
        <div id="conteudoEvento" class="detalhe-card" style="display:none;">

            <!-- Topo colorido -->
            <div class="detalhe-hero" id="detalheHero">
                <div class="detalhe-hero-inner">
                    <span class="badge" id="detalheCategoria"></span>
                    <h1 id="detalheNome" class="detalhe-titulo"></h1>
                    <div class="detalhe-meta">
                        <span id="detalheData"  class="meta-item">📅 —</span>
                        <span id="detalheLocal" class="meta-item">📍 —</span>
                    </div>
                </div>
            </div>

            <!-- Corpo -->
            <div class="detalhe-body">

                <section class="detalhe-descricao">
                    <h2>Sobre o evento</h2>
                    <p id="detalheDescricao" class="descricao-texto"></p>
                </section>

                <hr class="detalhe-divider">

                <div class="detalhe-info-grid">
                    <div class="info-item">
                        <span class="info-label">Capacidade total</span>
                        <span class="info-valor" id="detalheCapacidade">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Vagas disponíveis</span>
                        <span class="info-valor" id="detalheVagas">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Organizador</span>
                        <span class="info-valor" id="detalheOrganizador">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Categoria</span>
                        <span class="info-valor" id="detalheCategoriaInfo">—</span>
                    </div>
                </div>

                <div class="ocupacao-section">
                    <div class="ocupacao-bar">
                        <div class="ocupacao-fill" id="ocupacaoFill"></div>
                    </div>
                    <span class="ocupacao-label" id="ocupacaoLabel"></span>
                </div>

                <hr class="detalhe-divider">

                <div class="detalhe-acao">
                    <div id="msgInscricao" class="msg-feedback"></div>

                    <button
                        id="btnInscrever"
                        class="btn-primary btn-inscrever"
                        style="display:none;"
                        onclick="aoClicarInscrever()"
                    >
                        🎟️ Inscrever-se
                    </button>

                    <button
                        id="btnCancelarInscricao"
                        class="btn-cancelar-inscricao"
                        style="display:none;"
                        onclick="aoClicarCancelar()"
                    >
                        Cancelar minha inscrição
                    </button>

                    <a href="home.html" class="btn-voltar-link">← Voltar para eventos</a>
                </div>

            </div>
        </div>

    </main>

    <script src="../session.js"></script>
    <script src="home.js"></script>
    <script src="evento-detalhe.js"></script>
</body>
</html>

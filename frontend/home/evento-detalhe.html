<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento - EventFlow</title>
    <link rel="icon"        type="image/png" href="../img/Logo eventflow.png">
    <link rel="stylesheet"  href="../home/home.css">
    <link rel="stylesheet"  href="../eventos.css">
    <link rel="stylesheet"  href="evento-detalhe.css">
</head>
<body>

    <header class="header-eventflow" id="headerPill">
        <div class="logo-area">
            <img src="../img/Logo texto solo.png" alt="Logo EventFlow" class="img-logo">
        </div>
        <nav class="menu-horizontal-links">
            <a href="../home/home.html">Início</a>
            <a href="../home/conta/conta.html">Conta</a>
            <a href="#" onclick="logout('../inicial/index.html')">Sair</a>
        </nav>
        <button class="menu-hamburguer" id="btnMenu">
            <span class="barrinha"></span>
            <span class="barrinha"></span>
            <span class="barrinha"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <main class="page-wrapper">
        <div class="container">

            <!-- Mensagem de erro geral -->
            <div id="msgErro" class="msg-feedback" role="alert"></div>

            <!-- Conteúdo do evento — preenchido pelo JS -->
            <div id="conteudoEvento" style="display:none;">

                <!-- Cabeçalho visual do evento -->
                <div class="detalhe-hero" id="detalheHero">
                    <div class="detalhe-hero-inner">
                        <span class="badge" id="detalheCategoria"></span>
                        <h1 id="detalheNome" class="detalhe-titulo"></h1>
                        <div class="detalhe-meta">
                            <span id="detalheData" class="meta-item">📅 —</span>
                            <span id="detalheLocal" class="meta-item">📍 —</span>
                        </div>
                    </div>
                </div>

                <!-- Corpo com descrição + sidebar de inscrição -->
                <div class="detalhe-layout">

                    <!-- Coluna esquerda: descrição -->
                    <section class="detalhe-descricao card">
                        <h2>Sobre o evento</h2>
                        <p id="detalheDescricao" class="descricao-texto"></p>
                    </section>

                    <!-- Coluna direita: card de inscrição -->
                    <aside class="detalhe-aside">
                        <div class="card inscricao-card">
                            <div class="inscricao-info">
                                <div class="info-item">
                                    <span class="info-label">Vagas disponíveis</span>
                                    <span class="info-valor" id="detalheVagas">—</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Capacidade total</span>
                                    <span class="info-valor" id="detalheCapacidade">—</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Organizador</span>
                                    <span class="info-valor" id="detalheOrganizador">—</span>
                                </div>
                            </div>

                            <!-- Barra de ocupação -->
                            <div class="ocupacao-bar-container">
                                <div class="ocupacao-bar">
                                    <div class="ocupacao-fill" id="ocupacaoFill"></div>
                                </div>
                                <span class="ocupacao-label" id="ocupacaoLabel"></span>
                            </div>

                            <!-- Mensagem de sprint 2 / esgotado -->
                            <div id="msgInscricao" class="msg-feedback" style="margin-bottom:0;"></div>

                            <!-- Botão de inscrição — visível só para participantes -->
                            <button
                                id="btnInscrever"
                                class="btn-primary btn-inscrever"
                                style="display:none; width:100%; justify-content:center; margin-top:16px;"
                                onclick="aoClicarInscrever()"
                            >
                                Inscrever-se
                            </button>

                            <a href="../home/home.html" class="btn-voltar-link">← Voltar para eventos</a>
                        </div>
                    </aside>

                </div>
            </div>

            <!-- Skeleton enquanto carrega -->
            <div id="skeletonDetalhe">
                <div class="skeleton" style="height:240px;border-radius:20px;margin-bottom:28px;"></div>
                <div class="detalhe-layout">
                    <div class="card">
                        <div class="skeleton" style="height:20px;width:30%;margin-bottom:16px;"></div>
                        <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
                        <div class="skeleton" style="height:14px;width:90%;margin-bottom:8px;"></div>
                        <div class="skeleton" style="height:14px;width:80%;"></div>
                    </div>
                    <div class="card" style="height:260px;">
                        <div class="skeleton" style="height:100%;"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../session.js"></script>
    <script src="../home/home.js"></script>
    <script src="evento-detalhe.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Evento - EventFlow</title>
    <link rel="icon" type="image/png" href="../../img/Logo eventflow.png">
    <link rel="stylesheet" href="../home.css">
    <link rel="stylesheet" href="eventos.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="container-sm">
            <div class="card-form">
                <h2>✨ Publicar Novo Evento</h2>
                
                <form id="formCriar" class="form-grid">
                    
                    <div class="form-group full-width">
                        <label for="nome">Nome do Evento</label>
                        <input type="text" id="nome" placeholder="Ex: Workshop JS Sênior" required>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required>
                            <option value="Música">Música</option>
                            <option value="Teatro">Teatro</option>
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="Esportes">Esportes</option>
                            <option value="Arte">Arte</option>
                            <option value="Gastronomia">Gastronomia</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="capacidade">Capacidade Total</label>
                        <input type="number" id="capacidade" placeholder="Ex: 100" required>
                    </div>

                    <div class="form-group">
                        <label for="data_hora">Data e Hora</label>
                        <input type="datetime-local" id="data_hora" required>
                    </div>

                    <div class="form-group">
                        <label for="local">Local</label>
                        <input type="text" id="local" placeholder="Ex: Auditório PUC" required>
                    </div>

                    <div class="form-actions full-width">
                        <a href="../home.html" class="btn-secondary">Cancelar</a>
                        <button type="submit" class="btn-primary">Publicar Evento</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="criar-evento.js"></script>
</body>
</html>
